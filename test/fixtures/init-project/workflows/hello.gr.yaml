version: "1.0"
name: hello-world
description: Sample workflow generated by glyphrail init

inputSchema:
  type: object
  properties:
    name:
      type: string
  required: [name]

defaults:
  timeoutMs: 10000

state:
  name: null
  greeting: null

steps:
  - id: init
    kind: assign
    set:
      name: ${input.name}

  - id: greet
    kind: tool
    tool: makeGreeting
    input:
      name: ${state.name}
    save: state.greeting

  - id: done
    kind: return
    output:
      greeting: ${state.greeting}
