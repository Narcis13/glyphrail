version: "1.0"
name: resume-loop-demo
description: Resume an interrupted while-body step from the latest persisted cursor

state:
  count: 0
  resumeSignal: null

steps:
  - id: count_up
    kind: while
    condition: ${state.count != 3}
    maxIterations: 5
    steps:
      - id: increment
        kind: assign
        set:
          count: ${state.count + 1}

      - id: maybe_interrupt
        kind: tool
        when: ${state.count == 2}
        tool: interruptOnce
        save: state.resumeSignal

  - id: done
    kind: return
    output:
      count: ${state.count}
      resumeSignal: ${state.resumeSignal}
